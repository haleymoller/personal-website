<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Photographs — Haley Moller</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/work.css" />
</head>
<body>
  <main class="work-grid" style="grid-template-columns: 1fr; gap: 24px;">
    <div class="profile" style="justify-self: center; align-self: start;">
      <a class="brand" href="/">Haley<br>Moller</a>
      <div class="bio" style="max-width: 72ch; text-align: center;">
        <p>Selected photographs.</p>
      </div>
      <a class="work-card back-home" href="/">Back Home</a>
    </div>

    <section class="photo-feed" style="grid-column: 1;"></section>
    <div id="photo-sentinel" style="height: 1px;"></div>
  </main>

  <script type="module">
    // Try to auto-include any image placed in /photos using Vite's import.meta.glob.
    // If your environment doesn't pick these up, we'll fall back to photos.js.
    // Put files here on your computer:
    //   /Users/haleymoller/Desktop/Website 2025/photos/
    // Simpler, reliable source of file list: photos.js
    import { PHOTOS, CAPTIONS as RAW_CAPTIONS } from '/photos.js';
    // Clone and sort numerically so photo1 < photo2 < ... < photo10
    const collator = new Intl.Collator(undefined, { numeric: true, sensitivity: 'base' });
    let allPhotos = Array.isArray(PHOTOS) ? [...PHOTOS].sort((a, b) => collator.compare(a, b)) : [];

    // Fallback: load list from photos.js if glob returned nothing
    if (!allPhotos.length) {
      try {
        const mod = await import('./photos.js');
        if (mod && Array.isArray(mod.PHOTOS)) {
          allPhotos = mod.PHOTOS;
        }
      } catch (_) {
        // ignore
      }
    }

    const feed = document.querySelector('.photo-feed');
    const sentinel = document.getElementById('photo-sentinel');
    let nextIndex = 0;
    const BATCH_SIZE = 1; // load one at a time

    const CAPTIONS = {};
    if (RAW_CAPTIONS && typeof RAW_CAPTIONS === 'object') {
      for (const [k, v] of Object.entries(RAW_CAPTIONS)) {
        CAPTIONS[String(k).toLowerCase()] = v;
      }
    }

    function getCaption(url) {
      // strip query and path, lowercase filename
      const noQuery = url.split('?')[0];
      const file = noQuery.substring(noQuery.lastIndexOf('/') + 1).toLowerCase();
      return CAPTIONS[file] || "";
    }

    function candidateVariants(src) {
      // If src already includes an extension, try that first, then swap jpg/jpeg
      const m = src.match(/^(.*)\.(jpg|jpeg|png|webp|gif)(\?.*)?$/i);
      if (m) {
        const base = m[1], ext = m[2].toLowerCase(), q = m[3] || '';
        const swap = ext === 'jpg' ? 'jpeg' : ext === 'jpeg' ? 'jpg' : ext;
        const variants = [ext, swap];
        // add uppercase versions
        variants.push(ext.toUpperCase(), swap.toUpperCase());
        const order = [...new Set(variants)];
        return order.map(e => `${base}.${e}${q}`);
      }
      return [src];
    }

    function toRootPath(p) {
      return p && p.startsWith('/') ? p : `/${p || ''}`;
    }

    function loadWithFallback(src) {
      return new Promise(resolve => {
        const variants = candidateVariants(toRootPath(src));
        let i = 0;
        const img = new Image();
        const tryNext = () => {
          if (i >= variants.length) return resolve(null);
          img.src = variants[i++];
        };
        img.onload = () => resolve(img.src);
        img.onerror = tryNext;
        tryNext();
      });
    }

    function appendNextBatch() {
      let added = 0;
      while (added < BATCH_SIZE && nextIndex < allPhotos.length) {
        const src = allPhotos[nextIndex++];
        // Try loading with jpg/jpeg fallback
        loadWithFallback(src).then(okSrc => {
          if (!okSrc) return; // skip if not found
          const fig = document.createElement('figure');
          const img = document.createElement('img');
          img.loading = 'lazy';
          img.decoding = 'async';
          img.src = okSrc;
          img.alt = '';
          fig.appendChild(img);
          const cap = getCaption(okSrc);
          if (cap) {
            const fc = document.createElement('figcaption');
            fc.textContent = cap;
            fig.appendChild(fc);
          }
          feed.appendChild(fig);
        });
        added++; // schedule one
      }
      if (nextIndex >= allPhotos.length) observer.disconnect();
    }

    const observer = new IntersectionObserver((entries) => {
      if (entries.some(e => e.isIntersecting)) {
        if (allPhotos.length) {
          appendNextBatch();
        } else {
          appendNextSequential();
        }
      }
    }, { rootMargin: '300px' });

    observer.observe(sentinel);
    // initial load
    if (allPhotos.length) {
      appendNextBatch();
    } else {
      appendNextSequential();
    }

    // Fallback: sequential loader for names like photo1.jpg, photo2.jpg, ...
    let seqIndex = 1;
    let misses = 0;
    const exts = ['jpg','jpeg','png','webp','gif','JPG','JPEG','PNG','WEBP','GIF'];
    const MAX_MISSES = 25; // stop after many consecutive misses

    function tryLoad(url) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve(url);
        img.onerror = () => resolve(null);
        img.src = url;
      });
    }

    async function appendNextSequential() {
      if (misses >= MAX_MISSES) {
        observer.disconnect();
        return;
      }
      const base = '/photos/photo' + String(seqIndex);
      let found = null;
      for (const ext of exts) {
        const url = `${base}.${ext}`;
        // cache-bust once to avoid stale loads
        const ok = await tryLoad(`${url}?v=1`);
        if (ok) { found = url; break; }
      }
      seqIndex++;
      if (found) {
        misses = 0;
        const fig = document.createElement('figure');
        const img = document.createElement('img');
        img.loading = 'lazy';
        img.decoding = 'async';
        img.src = found;
        img.alt = '';
        fig.appendChild(img);
        const cap = getCaption(found);
        if (cap) {
          const fc = document.createElement('figcaption');
          fc.textContent = cap;
          fig.appendChild(fc);
        }
        feed.appendChild(fig);
      } else {
        misses++;
      }
    }
  </script>
</body>
</html>
